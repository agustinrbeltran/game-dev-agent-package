name: web-game-dev-agent-package
version: 2.0.1
description: >-
  A Web Game Developer role for AI coding agents — fast vanilla-TypeScript
  browser games on HTML5 Canvas and the DOM, covering grid/turn-based and
  real-time arcade games. Built for timed, feature-by-feature coding challenges:
  scaffold fast, add each feature additively, and verify by running.
author: Agustin Renteria Beltran
license: MIT

# Which agent platforms to deploy to.
# Resolution order: --target flag > this field > auto-detect from filesystem.
# Accepted values: vscode, agents, copilot, claude, cursor, opencode, codex,
# gemini, antigravity, windsurf, kiro, agent-skills, all
targets:
  - claude

dependencies:
  # The Web Game Developer skill lives under .apm/skills/web-game-developer/ and is
  # picked up automatically — no dependency entry needed.
  apm: []
  mcp: []

includes: auto
scripts: {}
